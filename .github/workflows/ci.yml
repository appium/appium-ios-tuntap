name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  node_matrix:
    uses: appium/appium-workflows/.github/workflows/node-lts-matrix.yml@main

  build-and-test:
    needs:
    - node_matrix
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(needs.node_matrix.outputs.versions) }}
        image: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.image }}

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install Linux dependencies
      if: ${{ contains(matrix.image, 'ubuntu') }}
      run: |
        sudo apt-get update
        # Try to install specific kernel headers, fall back to generic if not available
        if ! sudo apt-get install -y linux-headers-$(uname -r); then
          echo "Specific kernel headers not found, installing generic headers"
          sudo apt-get install -y linux-headers-generic
        fi
        # Install iproute2 for network configuration
        sudo apt-get install -y iproute2
        # Load the TUN module
        sudo modprobe tun

    - uses: SocketDev/action@v1
      with:
        mode: firewall-free
    - name: Install npm dependencies
      run: sfw npm install

    - name: Build native addon
      run: |
        # Set environment variable to treat warnings as non-fatal
        export CXXFLAGS="-Wno-error"
        npm run build:addon

    - name: Build TypeScript
      run: npm run build

    - name: Run Linter
      run: npm run lint

    - name: Run Prettier check
      run: npm run format:check

    - name: Check IPv6 configuration on Linux
      if: ${{ contains(matrix.image, 'ubuntu') }}
      run: |
        echo "Checking IPv6 configuration..."
        ip -6 addr
        sysctl net.ipv6.conf.all.disable_ipv6
        # Ensure IPv6 is enabled
        sudo sysctl -w net.ipv6.conf.all.disable_ipv6=0
        sudo sysctl -w net.ipv6.conf.default.disable_ipv6=0
        sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=0

    - name: Check Linux prerequisites
      if: ${{ contains(matrix.image, 'ubuntu') }}
      run: sudo bash test/check-linux-prereqs.sh

    - name: Run tests
      run: |
        # Run the test with sudo
        set +e  # Don't exit on error
        sudo npm test
        TEST_EXIT_CODE=$?

        # Collect diagnostic information if test fails
        if [ $TEST_EXIT_CODE -ne 0 ]; then
          echo "Test failed with exit code $TEST_EXIT_CODE"
          echo "Collecting diagnostic information..."
          sudo lsmod | grep tun
          ls -la /dev/net/tun
          ip link
          ip -6 addr
        fi

        exit $TEST_EXIT_CODE
