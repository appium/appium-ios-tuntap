name: Reusable native test

on:
  workflow_call:
    inputs:
      image:
        description: Runner image
        required: true
        type: string
      node-version:
        description: Node.js version
        required: true
        type: string
      test-command:
        description: Test command to execute
        required: true
        type: string
      test-name:
        description: Human-readable test name
        required: true
        type: string
      run-lint:
        description: Run lint before tests
        required: false
        default: false
        type: boolean
      run-format-check:
        description: Run prettier check before tests
        required: false
        default: false
        type: boolean

jobs:
  test:
    runs-on: ${{ inputs.image }}
    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Linux dependencies
      if: ${{ contains(inputs.image, 'ubuntu') }}
      run: |
        sudo apt-get update
        # Try to install specific kernel headers, fall back to generic if not available
        if ! sudo apt-get install -y linux-headers-$(uname -r); then
          echo "Specific kernel headers not found, installing generic headers"
          sudo apt-get install -y linux-headers-generic
        fi
        # Install iproute2 for network configuration
        sudo apt-get install -y iproute2
        # Load the TUN module
        sudo modprobe tun

    - uses: SocketDev/action@v1
      with:
        mode: firewall-free

    - name: Install npm dependencies
      run: sfw npm install

    - name: Run linter
      if: ${{ inputs.run-lint }}
      run: npm run lint

    - name: Run Prettier check
      if: ${{ inputs.run-format-check }}
      run: npm run format:check

    - name: Check IPv6 configuration on Linux
      if: ${{ contains(inputs.image, 'ubuntu') }}
      run: |
        echo "Checking IPv6 configuration..."
        ip -6 addr
        sysctl net.ipv6.conf.all.disable_ipv6
        # Ensure IPv6 is enabled
        sudo sysctl -w net.ipv6.conf.all.disable_ipv6=0
        sudo sysctl -w net.ipv6.conf.default.disable_ipv6=0
        sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=0

    - name: Check Linux prerequisites
      if: ${{ contains(inputs.image, 'ubuntu') }}
      run: sudo bash test/check-linux-prereqs.sh

    - name: Run ${{ inputs.test-name }}
      run: |
        # Run test command with sudo and gather diagnostics on failure.
        set +e
        sudo ${{ inputs.test-command }}
        TEST_EXIT_CODE=$?

        if [ $TEST_EXIT_CODE -ne 0 ]; then
          echo "${{ inputs.test-name }} failed with exit code $TEST_EXIT_CODE"
          if [ "$RUNNER_OS" = "Linux" ]; then
            echo "Collecting Linux diagnostic information..."
            sudo lsmod | grep tun
            ls -la /dev/net/tun
            ip link
            ip -6 addr
          else
            echo "No additional diagnostics configured for $RUNNER_OS"
          fi
        fi

        exit $TEST_EXIT_CODE
