name: Release

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write # to enable use of OIDC for trusted publishing and npm provenance

jobs:
  prebuild:
    uses: ./.github/workflows/prebuild.yml

  build:
    needs: prebuild
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js LTS
      uses: actions/setup-node@v6
      with:
        node-version: lts/*
        check-latest: true
    - name: Download prebuilds
      uses: actions/download-artifact@v4
      with:
        pattern: prebuild-*
        path: prebuild-staging
    - name: Merge prebuilds
      run: |
        mkdir -p prebuilds
        for dir in prebuild-staging/prebuild-*/; do
          cp -R "${dir}"* prebuilds/
        done
        find prebuilds -type f -name '*.node' | sort
    - run: npm install --no-package-lock
      name: Install dependencies
    - run: npm run test
      name: Run NPM Test
    - run: |
        rm -rf node_modules package-lock.json
        npm prune --omit=dev --omit=peer --no-package-lock
      name: Remove dev dependencies and appium peer dependencies
    - run: npm shrinkwrap --omit=dev --omit=peer
      name: Create shrinkwrap
      # "--no-package-lock" prevent adding dev dependencies in the shrinkwrap
    - run: npm install --only=dev --no-package-lock
      name: Install dev dependencies for the release

    - run: npx semantic-release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      name: Release
